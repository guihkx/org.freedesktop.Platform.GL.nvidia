name: build, install & test

on:
  # TODO: Remove 'push' before sending a PR.
  push:
  pull_request:
  workflow_dispatch:

env:
  # Example: ./data/nvidia-570.86.16-x86_64.data
  DATA_FILE_PATH: ./data/nvidia-%s-%s.data
  # Example: ./tests/R570-x86_64-GL-expected-files.txt
  TEST_FILE_PATH: ./tests/R%d-%s-%s-expected-files.txt

defaults:
  run:
    # default: https://docs.github.com/en/actions/writing-workflows/workflow-syntax-for-github-actions#jobsjob_iddefaultsrunshell
    shell: bash -euxo pipefail {0}

jobs:
  setup:
    runs-on: ubuntu-24.04
    outputs:
      matrix-json: ${{ steps.set-matrix.outputs.matrix-json }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure that data files exist
        id: data
        run: |
          # shellcheck disable=SC1091
          source ./versions.sh
          # This converts $DRIVER_VERSIONS from versions.sh into an array.
          read -ra DRIVER_VERSIONS <<< "${DRIVER_VERSIONS}"

          versions_x86=()
          versions_aarch64=()
          errors=()

          for version in "${DRIVER_VERSIONS[@]}"; do
            # Create a list of the data files we expect to be present in the data/ directory.
            data_files=("$(printf -- '${{ env.DATA_FILE_PATH }}' "${version}" x86_64)"
                        "$(printf -- '${{ env.DATA_FILE_PATH }}' "${version}" i386)"
                        "$(printf -- '${{ env.DATA_FILE_PATH }}' "${version}" aarch64)")

            for data_file in "${data_files[@]}"; do
              # In current times, it's safe to assume that NVIDIA will always provide drivers for x86_64 (and i386), so
              # data file for both x86_64 and i386 must always be present. In the future, this might require adjusting.
              if [[ "${data_file}" == *x86_64* ]] || [[ "${data_file}" == *i386* ]]; then
                if [ ! -f "${data_file}" ]; then
                  if [[ "${data_file}" == *i386* ]]; then
                    driver_arch=i386
                  else
                    driver_arch=x86_64
                  fi
                  errors+=("${version}-${driver_arch}")
                  echo "::error::Missing ${driver_arch} data file '${data_file}' for driver version ${version}. Please check out the README.md file to learn how to generate it."
                  continue
                fi
                versions_x86+=("${version}")
              # For non-x86 architectures, we can relax the check for the data file, because there's no easy way of knowing
              # with certainty that a driver release has aarch64 support, e.g. beta Vulkan drivers.
              elif [[ "${data_file}" == *aarch64* ]]; then
                if [ -f "${data_file}" ]; then
                  versions_aarch64+=("${version}")
                fi
              fi
            done
          done
            
          if [ "${#errors[@]}" -ne 0 ]; then
            echo "::error::Driver version(s) with error(s): ${errors[*]}"
            exit 1
          fi

          echo "versions_x86=$(jq -cn '$ARGS.positional' --args -- "${versions_x86[@]}")" >> "${GITHUB_OUTPUT}"
          echo "versions_aarch64=$(jq -cn '$ARGS.positional' --args -- "${versions_aarch64[@]}")" >> "${GITHUB_OUTPUT}"

      - name: Ensure that test files exist
        run: |
          # Convert the JSON output from the 'data' step back to a Bash array.
          mapfile -t versions_x86 < <(echo '${{ steps.data.outputs.versions_x86 }}' | jq -r '.[]')
          mapfile -t versions_aarch64 < <(echo '${{ steps.data.outputs.versions_aarch64 }}' | jq -r '.[]')
          errors=()

          for version in "${versions_x86[@]}"; do
            version_major="${version%%.*}"

            # Create a list of x86_64 (GL) and i386 (GL32) test files we expect to be present in the tests/ directory.
            test_files=("$(printf -- '${{ env.TEST_FILE_PATH }}' "${version_major}" x86_64 GL)"
                         # On x86_64 we expect to exist a i386 data file as well.
                        "$(printf -- '${{ env.TEST_FILE_PATH }}' "${version_major}" x86_64 GL32)")

            for test_file in "${test_files[@]}"; do
              if [ ! -f "${test_file}" ]; then
                if [[ "${test_file}" == *GL32* ]]; then
                  driver_arch=i386
                else
                  driver_arch=x86_64
                fi
                errors+=("${version}-${driver_arch}")
                echo "::error::Missing ${driver_arch} test file '${test_file}' for driver version ${version}. Please check out the README.md file to learn how to generate it."
                continue
              fi
            done
          done

          for version in "${versions_aarch64[@]}"; do
            version_major="${version%%.*}"

            # Define the aarch64 (GL) test file we expect to be present in the tests/ directory.
            test_file=$(printf -- '${{ env.TEST_FILE_PATH }}' "${version_major}" aarch64 GL)

            if [ ! -f "${test_file}" ]; then
              errors+=("${version}-aarch64")
              echo "::error::Missing aarch64 test file '${test_file}' for driver version ${version}. Please check out the README.md file to learn how to generate it."
              continue
            fi
          done

          if [ "${#errors[@]}" -ne 0 ]; then
            echo "::error::Driver version(s) with error(s): ${errors[*]}"
            exit 1
          fi

      - name: Generate a list of driver versions to test
        id: set-matrix
        run: |
          # Convert the JSON output from the 'data' step back to a Bash array.
          mapfile -t versions_x86 < <(echo '${{ steps.data.outputs.versions_x86 }}' | jq -r '.[]')
          mapfile -t versions_aarch64 < <(echo '${{ steps.data.outputs.versions_aarch64 }}' | jq -r '.[]')

          # Extract only the most recent driver version we have of each major release.
          read -ra versions_x86 <<< "$(printf -- '%s\n' "${versions_x86[@]}" | sort -t. -k1,1nr -k2,2nr -k3,3nr | awk -F. '!seen[$1]++' | head -n1 | xargs)"
          read -ra versions_aarch64 <<< "$(printf -- '%s\n' "${versions_aarch64[@]}" | sort -t. -k1,1nr -k2,2nr -k3,3nr | awk -F. '!seen[$1]++' | head -n1 | xargs)"

          # Transform the arrays above back into a JSON object, to be later used by the next GitHub Actions job to dynamically create the build/test matrix.
          x86_json=$(jq -cn '$ARGS.positional | map({version: ., version_major: split(".")[0], arch: "x86_64"})' --args -- "${versions_x86[@]}")
          aarch64_json=$(jq -cn '$ARGS.positional | map({version: ., version_major: split(".")[0], arch: "aarch64"})' --args -- "${versions_aarch64[@]}")

          # Create the final build matrix by joining the two JSON objects above.
          matrix_json=$(jq -cn --argjson x86 "${x86_json}" --argjson aarch64 "${aarch64_json}" '{include: ($x86 + $aarch64)}')

          echo "matrix-json=${matrix_json}" >> "${GITHUB_OUTPUT}"

  test:
    needs: setup
    name: R${{ matrix.version_major }} / ${{ matrix.arch }} / test ${{ matrix.version }}
    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    outputs:
      test-files-diffs: ${{ steps.test-files.outputs.diffs }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix-json) }}
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-24.08
      options: --privileged
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prevent git's dubious ownership error
        run: git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Modify versions.sh to only build version ${{ matrix.version }}
        run: echo 'DRIVER_VERSIONS="${{ matrix.version }}"' >> ./versions.sh
        
      - name: Run build script
        run: ./build.sh '${{ matrix.arch }}' ./repo '' '--sandbox --install-deps-from=flathub --disable-rofiles-fuse'

      - name: Install GL extension
        run: flatpak install -y --noninteractive ./repo "runtime/org.freedesktop.Platform.GL.nvidia-$(tr . - <<< '${{ matrix.version }}')/${{ matrix.arch }}/1.4"

      - name: Install GL32 extension
        if: matrix.arch == 'x86_64'
        run: flatpak install -y --noninteractive ./repo "runtime/org.freedesktop.Platform.GL32.nvidia-$(tr . - <<< '${{ matrix.version }}')/${{ matrix.arch }}/1.4"

      - name: Regenerate test files
        run: |
          # Replace dots by dashes in the driver version string.
          version_dash=$(tr . - <<< '${{ matrix.version }}')

          # Flatpak refs to test.
          refs=("runtime/org.freedesktop.Platform.GL.nvidia-${version_dash}/${{ matrix.arch }}/1.4")

          # Check if we're on x86_64 and assume we have the GL32 (i386) extension installed too.
          if [[ '${{ matrix.arch }}' == 'x86_64' ]]; then
            refs+=("runtime/org.freedesktop.Platform.GL32.nvidia-${version_dash}/x86_64/1.4")
          fi
  
          for ref in "${refs[@]}"; do
            if [[ "${ref}" == *GL32* ]]; then
              ext_suffix='GL32'
            else
              ext_suffix='GL'
            fi
            test_file=$(printf -- '${{ env.TEST_FILE_PATH }}' '${{ matrix.version_major }}' '${{ matrix.arch }}' "${ext_suffix}")
            
            # Get the installation path of the current ref.
            install_path="$(flatpak info -l "${ref}")/files"

            # Regenerate the test files.
            (
              cd "${install_path}" && \
              # We use find(1) from findutils to traverse the installation directory, and then print the list of files in the following format:
              #
              # FILE PATH | PERMISSIONS IN OCTAL NOTATION (PERMISSIONS IN SYMBOLIC NOTATION)
              #
              # For example:
              # 
              # bin | 0755 (drwxr-xr-x)
              # bin/apply_extra | 0755 (-rwxr-xr-x)
              # bin/ldconfig | 0755 (-rwxr-xr-x)
              #
              # An exception to that are symlinks, which are displayed slightly differently:
              #
              # SYMLINK PATH (TARGET TYPE) -> SYMLINK TARGET PATH | PERMISSIONS IN OCTAL NOTATION (PERMISSIONS IN SYMBOLIC NOTATION)
              #
              # For example:
              #
              # OpenCL (d) -> extra/OpenCL | 0777 (lrwxrwxrwx)
              # egl (N) -> extra/egl | 0777 (lrwxrwxrwx)
              #
              # "TARGET TYPE" is a single letter that indicates the type of the file the symlink points to. "d": directories, "f": files, "N": broken symlinks.
              # "SYMLINK TARGET PATH" indicates the path where the symlink points to.
              #
              # Those are useful for checking whether we have broken symlinks.
              #
              # Please check out the "-printf" section of the find(1) manual for more details: https://man.archlinux.org/man/find.1.en#printf
              find . ! -path . ! -path ./.ref ! -path ./manifest.json \( -type l -printf '%P (%Y) -> %l | %#m (%M)\n' -o -printf '%P | %#m (%M)\n' \) | \
              # To ensure that we get a deterministic output, we need to sort it.
              sort -n | \
              # To ensure that we can reuse the list of files of a major release across minor/patch releases, we need replace the
              # entire version string in filenames by only $MAJOR, so e.g. "libGL.so.570.86.16" becomes "libGL.so.570", and
              # "nvidia-application-profiles-570-86-16-key-documentation" becomes "nvidia-application-profiles-570-key-documentation".
              #
              # We could use sed to accomplish that, but because it doesn't do literal string substitution, dot characters in the driver
              # version string would be treated as a regex metacharacter and match anything, which is probably okay, but undesirable.
              # Instead, we can use Perl to escape dot characters more easily: https://perldoc.perl.org/perlre#Escape-sequences
              perl -pe "s/\Q${{ matrix.version }}\E|\Q${version_dash}\E/${{ matrix.version_major }}/g"
            ) > "${test_file}"
          done

      - name: Ensure that test files haven't been modified
        id: test-files
        run: |
          # Display an error if any of the regenerated test files have been modified, but don't fail immediately,
          # because we need to wait for all concurrent build jobs to finish, to then generate a complete git diff file
          # of the changes, which can then be downloaded and applied (which is optional and only done for convenience).

          test_files=("$(printf -- '${{ env.TEST_FILE_PATH }}' '${{ matrix.version_major }}' '${{ matrix.arch }}' GL)")
          if [[ '${{ matrix.arch }}' == 'x86_64' ]]; then
            test_files+=("$(printf -- '${{ env.TEST_FILE_PATH }}' '${{ matrix.version_major }}' '${{ matrix.arch }}' GL32)")
          fi

          modified_tests=()
          diffs=()
          for test_file in "${test_files[@]}"; do
            if ! diff=$(git diff --exit-code -- "${test_file}"); then
              diff_file="$(basename -s.txt "${test_file}").diff"
              echo "${diff}" > "${diff_file}"
              diffs+=("${diff_file}")
              modified_tests+=("${test_file}")
              echo "::error::Test file '${test_file}' has been modified"
            fi
          done

          if [ "${#modified_tests[@]}" -gt 0 ]; then
            diffs_json=$(jq -cn '$ARGS.positional' --args -- "${diffs[@]}")
            echo "diffs=${diffs_json}" >> "${GITHUB_OUTPUT}"
            echo '::error::One or more test files have been modified. Please wait for any remaining build jobs to finish,' \
                 'and a git diff file will be generated in the "tests-diff" job, which you can then inspect and optionally' \
                 'apply and commit against your own git tree to fix these errors.'
            exit 1
          fi

      - name: Upload tests diffs
        uses: actions/upload-artifact@v4
        if: failure() && fromJson(steps.test-files.outputs.diffs)[0] != null
        with:
          name: tests-R${{ matrix.version_major }}-${{ matrix.arch }}-expected-files-diff
          path: '*.diff'
          if-no-files-found: error

  tests-diff:
    needs: test
    if: failure() && fromJson(needs.test.outputs.test-files-diffs)[0] != null
    runs-on: ubuntu-24.04
    steps:
      - name: Download tests diffs
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Combine tests diffs into one diff file
        run: awk 'FNR==1 && NR>1 { print "" } 1' *.diff > tests-all.diff

      - name: Upload tests-all.diff
        uses: actions/upload-artifact@v4
        with:
          name: tests-all-diffs
          path: tests-all.diff
          if-no-files-found: error
